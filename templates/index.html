<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="15">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SistaSekunden 🚶</title>
    <style>
        body { 
            background-color: #0e1117; 
            color: white; 
            font-family: 'Roboto Condensed', sans-serif; 
            letter-spacing: 0.05em;
            margin: 0; 
            padding: 10px; 
        }
        .container { width: 100%; max-width: 100%; margin: 0; }
        
        /* Table-based layout for best compatibility on iOS 9 */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px; /* Space between rows */
        }
        th { 
            color: #8b949e; 
            font-size: 3.0em; 
            text-transform: uppercase; 
            padding-bottom: 5px;
        }
        td { 
            background-color: #080816; 
            border-top: 1px solid #30363d;
            border-bottom: 1px solid #30363d;
            padding: 15px 5px;
            text-align: center;
        }
        /* Rounded corners for rows */
        td:first-child { border-left: 1px solid #30363d; border-radius: 8px 0 0 8px; text-align: left; padding-left: 15px; }
        td:last-child { border-right: 1px solid #30363d; border-radius: 0 8px 8px 0; }

        .blue-text { color: #58a6ff; text-transform: uppercase; font-weight: bold; font-size: 3em; }
        .line-dest { color: #c1deff; font-size: 3.5em; }
        .time-val { font-size: 4.7em; }
        
        /* Legacy Colors */
        .red { color: #e05656; background-color: rgba(224, 86, 86, 0.05);}
        .orange { color: #d29c38; background-color: rgba(210, 156, 56, 0.02);}
        .yellow { color: #e3e33f; background-color: rgba(227, 227, 63, 0.01);}
        .green { color: #47b962; }

        hr { border: 0; border-top: 1px solid #30363d; margin: 20px 0; }
        .caption { color: #8b949e; font-size: 0.8em; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        {% if departures %}
            {% include "partials/departure_list.html" %}
        {% else %}
            <h1>Inga avgångar 😞</h1>
        {% endif %}
        <hr>
        <p class="caption">
            Last uppdated: {{ updated }} |
            Data pulled: {{ data_pulled }} |
            Current version: {{ git_hash }}
        </p>
    </div>
</body>
</html>
